<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AM — Portal</title>
    <link
      rel="shortcut icon"
      href="image/power_14807072.png"
      type="image/x-icon"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500..700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: "Oswald", sans-serif;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #f0f0f0;
        transition:
          background 0.8s cubic-bezier(0.16, 1, 0.3, 1),
          color 0.8s ease;
      }

      body.hover-design {
        background: #ffffff;
        color: #000000;
      }
      body.hover-play {
        background: #f5e642;
        color: #d61414;
      }
      body.hover-universe {
        background: #04072b;
        color: #c8d6ff;
      }

      #bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        opacity: 0.17;
        pointer-events: none;
      }

      #intro {
        position: fixed;
        inset: 0;
        background: #ffffff;
        z-index: 9000;
        display: none;
        transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
      }
      #intro.ready {
        display: block;
      }
      #intro.slide-up {
        transform: translateY(-100%);
      }

      .hero-line,
      .corner-tl,
      .corner-tr,
      .corner-bl,
      .marquee-bar,
      .bottom-hint {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hero-line.revealed,
      .corner-tl.revealed,
      .corner-tr.revealed,
      .corner-bl.revealed,
      .marquee-bar.revealed,
      .bottom-hint.revealed {
        opacity: 1;
        transform: translateY(0);
      }

      @media (hover: hover) and (pointer: fine) {
        html,
        body {
          cursor: none;
        }
      }
      .cursor,
      .cursor-ring {
        position: fixed;
        pointer-events: none;
        transform: translate(-50%, -50%);
        display: none;
      }
      .cursor {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
        z-index: 9999;
        transition:
          transform 0.12s,
          opacity 0.3s;
      }
      .cursor-ring {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid currentColor;
        z-index: 9998;
        opacity: 0.35;
      }
      @media (hover: hover) and (pointer: fine) {
        .cursor,
        .cursor-ring {
          display: block;
        }
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 160px;
      }
      .vline {
        position: fixed;
        top: 0;
        width: 1px;
        height: 100vh;
        background: currentColor;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        display: none;
      }
      @media (hover: hover) and (pointer: fine) {
        .vline {
          display: block;
        }
      }

      .corner-tl,
      .corner-tr,
      .corner-bl {
        position: fixed;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: none;
        z-index: 50;
      }
      .corner-tl {
        top: 2rem;
        left: 2.5rem;
      }
      .corner-tr {
        top: 2rem;
        right: 2.5rem;
      }
      .corner-bl {
        bottom: 3rem;
        left: 2.5rem;
      }

      .hero {
        height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: clamp(3rem, 14vw, 16rem);
        margin-left: 8rem;
      }
      .hero-line {
        position: relative;
        padding: 0.06em 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .hero-line h1 {
        font-size: clamp(2.8rem, 13vw, 15rem);
        font-weight: 800;
        line-height: 0.88;
        letter-spacing: -0.025em;
        display: inline-block;
        transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
        user-select: none;
        white-space: nowrap;
      }
      .hero-line.active h1 {
        transform: translateX(2rem);
      }

      .char {
        display: inline-block;
        transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .ticker {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 1.5px;
        width: 0;
        background: currentColor;
        transition: width 0.65s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hero-line.touch-active .ticker {
        width: 100%;
      }
      @media (hover: hover) and (pointer: fine) {
        .hero-line:hover .ticker {
          width: 100%;
        }
      }

      .idx {
        position: absolute;
        left: -3.2rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 10px;
        opacity: 0.28;
        letter-spacing: 0.15em;
        pointer-events: none;
      }
      .enter-tag {
        position: absolute;
        right: clamp(1rem, 6vw, 5rem);
        top: 50%;
        transform: translateY(-50%) translateX(10px);
        font-size: 10px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.4s ease,
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @media (hover: hover) and (pointer: fine) {
        .hero-line:hover .enter-tag {
          opacity: 0.45;
          transform: translateY(-50%) translateX(0);
        }
      }
      .hero-line.touch-active .enter-tag {
        opacity: 0.45;
        transform: translateY(-50%) translateX(0);
      }

      .img-slot {
        position: fixed;
        pointer-events: none;
        z-index: 200;
        overflow: hidden;
        border-radius: 3px;
      }
      .img-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .marquee-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 30px;
        border-top: 0.5px solid currentColor;
        overflow: hidden;
        display: flex;
        align-items: center;
        pointer-events: none;
        z-index: 50;
      }
      .marquee-bar.revealed {
        opacity: 0.2;
      }
      .marquee-inner {
        display: flex;
        gap: 2rem;
        white-space: nowrap;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: tick 22s linear infinite;
      }
      @keyframes tick {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      .bottom-hint {
        position: fixed;
        bottom: 42px;
        left: 50%;
        transform: translateX(-50%) translateY(28px);
        font-size: 9px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        z-index: 60;
        text-align: center;
        white-space: nowrap;
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .bottom-hint.revealed {
        opacity: 0.28;
        transform: translateX(-50%) translateY(0);
      }
      .bottom-hint.dismissed {
        opacity: 0 !important;
        transition: opacity 0.4s ease;
      }

      /* ─────────────────────────────────────────────────────
         RESPONSIVE
      ───────────────────────────────────────────────────── */
      @media (max-width: 1024px) {
        .hero {
          margin-left: 4rem;
          padding-left: clamp(2.5rem, 8vw, 6rem);

      @media (max-width: 768px) {

        .idx {

        #play-btn {

          text-transform: uppercase;

        .corner-tl {

        }
        .corner-tr {

        .corner-bl {

          font-size: 9px;
        }
        .marquee-bar {
          height: 26px;
        }
        .marquee-inner {
          font-size: 9px;
        }
        .bottom-hint {

          font-size: 8px;

        }
        #play-btn {

        .hero {

        }
        .play-circle {
          width: 44px;

          border-radius: 50%;
          border: 1px solid currentColor;

        .play-label {
          font-family: "Oswald", sans-serif;
          font-size: 9px;
          letter-spacing: 0.3em;
          text-transform: uppercase;
          opacity: 0.4;
        }
      }
    </style>
  </head>

    <script>
      /* ── BG VIDEO ────────────────────────────────────── */
      (function () {
        const vid = document.getElementById("bg-video");
        const btn = document.getElementById("play-btn");

        vid.muted = true;
        vid.defaultMuted = true;

        function showBtn() {
          if (!touch) return;
          btn.classList.add("visible");
          setTimeout(() => btn.classList.add("show"), 800);
        }

        function hideBtn() {
          btn.classList.remove("show");
          setTimeout(() => btn.classList.remove("visible"), 500);
        }

        vid.play().catch(() => {
          // show custom button on mobile
          showBtn();

          // still silently catch any tap anywhere as backup
          const events = ["touchstart", "touchend", "click"];
          function onGesture() {
            vid
              .play()
              .then(() => hideBtn())
              .catch(() => {});
            events.forEach((e) => document.removeEventListener(e, onGesture));
          }
          events.forEach((e) =>
            document.addEventListener(e, onGesture, {
              once: true,
              passive: true,
            }),
          );
        });

        // explicit button tap
        btn.addEventListener("click", () => {
          vid
            .play()
            .then(() => hideBtn())
            .catch(() => {});
        });
      })();

      /* ── DEVICE DETECTION ────────────────────────────── */
      const touch =
        window.matchMedia("(hover:none),(pointer:coarse)").matches ||
        "ontouchstart" in window ||
        navigator.maxTouchPoints > 0;

      /* ── HINT TEXT ───────────────────────────────────── */
      const hintEl = document.getElementById("bottom-hint");
      hintEl.textContent = touch
        ? "Tap a profile to enter"
        : "Hover a profile · click to enter";

      /* ── INTRO WIPE ──────────────────────────────────── */
      const introEl = document.getElementById("intro");
      introEl.classList.add("ready");
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          introEl.classList.add("slide-up");
          revealContent();
        });
      });

      function revealContent() {
        document
          .querySelectorAll(
            ".hero-line, .corner-tl, .corner-tr, .corner-bl, .marquee-bar, .bottom-hint",
          )
          .forEach((el, i) => {
            setTimeout(() => el.classList.add("revealed"), 600 + i * 110);
          });
      }

      /* ── CUSTOM CURSOR ───────────────────────────────── */
      const cur = document.getElementById("cur");
      const ringEl = document.getElementById("ring");
      const vline = document.getElementById("vline");
      let mx = 0,
        my = 0,
        rx = 0,
        ry = 0;

      if (!touch) {
        document.addEventListener("mousemove", (e) => {
          mx = e.clientX;
          my = e.clientY;
          cur.style.left = mx + "px";
          cur.style.top = my + "px";
          vline.style.left = mx + "px";
        });
        (function raf() {
          rx += (mx - rx) * 0.1;
          ry += (my - ry) * 0.1;
          ringEl.style.left = rx + "px";
          ringEl.style.top = ry + "px";
          requestAnimationFrame(raf);
        })();
        document.addEventListener("mousedown", () => {
          cur.style.transform = "translate(-50%,-50%) scale(3)";
          cur.style.opacity = "0.3";
        });
        document.addEventListener("mouseup", () => {
          cur.style.transform = "translate(-50%,-50%) scale(1)";
          cur.style.opacity = "1";
        });
      }

      /* ── IMAGE ANIMATION ENGINE ──────────────────────── */
      const easeOut3 = (t) => 1 - Math.pow(1 - t, 3);
      const DUR = 660;

      function makeSlotAnim(wrap, img) {
        let rafId = null,
          prog = 0,
          dir = 0,
          startProg = 0,
          startT = null;
        function apply(p) {
          wrap.style.clipPath = `inset(${((1 - p) * 100).toFixed(2)}% 0 0 0)`;
          img.style.transform = `scale(${(1 + (1 - p) * 0.12).toFixed(4)})`;
        }
        function tick(ts) {
          if (!startT) startT = ts;
          const t = Math.min((ts - startT) / DUR, 1);
          prog = startProg + ((dir === 1 ? 1 : 0) - startProg) * easeOut3(t);
          apply(prog);
          if (t < 1) rafId = requestAnimationFrame(tick);
          else {
            prog = dir === 1 ? 1 : 0;
            apply(prog);
            rafId = null;
          }
        }
        function run(d) {
          if (rafId) cancelAnimationFrame(rafId);
          dir = d;
          startProg = prog;
          startT = null;
          rafId = requestAnimationFrame(tick);
        }
        return {
          get prog() {
            return prog;
          },
          reveal() {
            run(1);
          },
          retrace() {
            run(-1);
          },
          hide() {
            if (rafId) cancelAnimationFrame(rafId);
            prog = 0;
            apply(0);
            rafId = null;
          },
        };
      }

      const sL = [
        makeSlotAnim(
          document.getElementById("slotL-a"),
          document.getElementById("imgLA"),
        ),
        makeSlotAnim(
          document.getElementById("slotL-b"),
          document.getElementById("imgLB"),
        ),
      ];
      const sR = [
        makeSlotAnim(
          document.getElementById("slotR-a"),
          document.getElementById("imgRA"),
        ),
        makeSlotAnim(
          document.getElementById("slotR-b"),
          document.getElementById("imgRB"),
        ),
      ];
      const imgEls = {
        L: [document.getElementById("imgLA"), document.getElementById("imgLB")],
        R: [document.getElementById("imgRA"), document.getElementById("imgRB")],
      };
      sL[0].hide();
      sL[1].hide();
      sR[0].hide();
      sR[1].hide();
      let aL = 0,
        aR = 0,
        imVis = false;

      function showImages(lSrc, rSrc) {
        if (!imVis) {
          imVis = true;
          imgEls.L[aL].src = lSrc;
          imgEls.R[aR].src = rSrc;
          sL[aL].reveal();
          setTimeout(() => sR[aR].reveal(), 100);
          return;
        }
        const nL = 1 - aL,
          nR = 1 - aR;
        imgEls.L[nL].src = lSrc;
        imgEls.R[nR].src = rSrc;
        ["slotL-a", "slotL-b"].forEach(
          (id, i) =>
            (document.getElementById(id).style.zIndex = i === nL ? 202 : 200),
        );
        ["slotR-a", "slotR-b"].forEach(
          (id, i) =>
            (document.getElementById(id).style.zIndex = i === nR ? 202 : 200),
        );
        sL[aL].retrace();
        sR[aR].retrace();
        sL[nL].reveal();
        setTimeout(() => sR[nR].reveal(), 90);
        aL = nL;
        aR = nR;
      }

      function hideImages() {
        if (!imVis) return;
        imVis = false;
        sL[aL].retrace();
        setTimeout(() => sR[aR].retrace(), 80);
      }

      /* ── SLOT LAYOUT ─────────────────────────────────── */
      /*
        MOBILE IMAGE SIZES — edit the data-mob-* attributes on each
        hero-line div in the HTML above. The attributes are:

          data-mob-lw      left image width   e.g. "40vw" or "200px"
          data-mob-lh      left image height  e.g. "50vw" or "250px"
          data-mob-lleft   left image distance from left edge  e.g. "0px"
          data-mob-lmt     left image vertical offset (negative = up) e.g. "-25vw"

          data-mob-rw      right image width
          data-mob-rh      right image height
          data-mob-rright  right image distance from right edge e.g. "0px"
          data-mob-rmt     right image vertical offset e.g. "-25vw"
      */
      function applySlotLayout(line) {
        if (touch) {
          ["slotL-a", "slotL-b"].forEach((id) => {
            const el = document.getElementById(id);
            el.style.display = "block";
            el.style.width = line.dataset.mobLw || "40vw";
            el.style.height = line.dataset.mobLh || "50vw";
            el.style.left = line.dataset.mobLleft || "0px";
            el.style.top = "50%";
            el.style.marginTop = line.dataset.mobLmt || "-25vw";
            el.style.right = "auto";
          });
          ["slotR-a", "slotR-b"].forEach((id) => {
            const el = document.getElementById(id);
            el.style.display = "block";
            el.style.width = line.dataset.mobRw || "40vw";
            el.style.height = line.dataset.mobRh || "50vw";
            el.style.right = line.dataset.mobRright || "0px";
            el.style.top = "50%";
            el.style.marginTop = line.dataset.mobRmt || "-25vw";
            el.style.left = "auto";
          });
          return;
        }
        ["slotL-a", "slotL-b"].forEach((id) => {
          const el = document.getElementById(id);
          el.style.width = line.dataset.lw + "px";
          el.style.height = line.dataset.lh + "px";
          el.style.left = line.dataset.lleft;
          el.style.top = line.dataset.ltop;
          el.style.marginTop = line.dataset.lmt + "px";
          el.style.right = "auto";
        });
        ["slotR-a", "slotR-b"].forEach((id) => {
          const el = document.getElementById(id);
          el.style.width = line.dataset.rw + "px";
          el.style.height = line.dataset.rh + "px";
          el.style.right = line.dataset.rright;
          el.style.top = line.dataset.rtop;
          el.style.marginTop = line.dataset.rmt + "px";
          el.style.left = "auto";
        });
      }

      /* ── HINT DISMISS ────────────────────────────────── */
      let hintDismissed = false;
      function dismissHint() {
        if (hintDismissed) return;
        hintDismissed = true;
        hintEl.classList.add("dismissed");
      }

      /* ── RESET ALL LINES ─────────────────────────────── */
      function resetAllLines() {
        body.classList.remove("hover-design", "hover-play", "hover-universe");
        lines.forEach((l) => {
          l.classList.remove("active", "touch-active");
          l._activated = false;
          l.querySelectorAll(".char").forEach((c) => {
            c.style.transitionDelay = "0s";
            c.style.transform = "translateY(0)";
          });
        });
        hideImages();
      }

      /* ── LINE INTERACTIONS ───────────────────────────── */
      const body = document.body;
      const lines = document.querySelectorAll(".hero-line");

      lines.forEach((line) => {
        const hc = line.dataset.hoverClass;
        const url = line.dataset.url;
        const chars = line.querySelectorAll(".char");
        line._activated = false;

        if (!touch) {
          /* DESKTOP */
          line.addEventListener("mouseenter", () => {
            dismissHint();
            body.classList.remove(
              "hover-design",
              "hover-play",
              "hover-universe",
            );
            if (hc) body.classList.add(hc);
            vline.style.opacity = "1";
            chars.forEach((c, i) => {
              c.style.transitionDelay = i * 0.032 + "s";
              c.style.transform = "translateY(-5px)";
            });
            applySlotLayout(line);
            showImages(line.dataset.left, line.dataset.right);
          });
          line.addEventListener("mouseleave", () => {
            body.classList.remove(
              "hover-design",
              "hover-play",
              "hover-universe",
            );
            vline.style.opacity = "0";
            chars.forEach((c) => {
              c.style.transitionDelay = "0s";
              c.style.transform = "translateY(0)";
            });
            hideImages();
          });
          line.addEventListener("click", () => {
            lines.forEach((l) => l.classList.remove("active"));
            line.classList.add("active");
            setTimeout(() => (window.location.href = url), 300);
          });
        } else {
          /* MOBILE — first tap previews, second tap navigates */
          let moved = false;

          line.addEventListener(
            "touchstart",
            () => {
              moved = false;
            },
            { passive: true },
          );
          line.addEventListener(
            "touchmove",
            () => {
              moved = true;
            },
            { passive: true },
          );

          line.addEventListener(
            "touchend",
            () => {
              if (moved) return;

              if (!line._activated) {
                /* first tap — preview */
                line._activated = true;
                dismissHint();

                /* reset other lines */
                lines.forEach((l) => {
                  if (l !== line) {
                    l._activated = false;
                    l.classList.remove("active", "touch-active");
                    l.querySelectorAll(".char").forEach((c) => {
                      c.style.transitionDelay = "0s";
                      c.style.transform = "translateY(0)";
                    });
                  }
                });

                body.classList.remove(
                  "hover-design",
                  "hover-play",
                  "hover-universe",
                );
                if (hc) body.classList.add(hc);
                chars.forEach((c, i) => {
                  c.style.transitionDelay = i * 0.025 + "s";
                  c.style.transform = "translateY(-4px)";
                });
                line.classList.add("active", "touch-active");
                applySlotLayout(line);
                showImages(line.dataset.left, line.dataset.right);
              } else {
                /* second tap — navigate */
                setTimeout(() => (window.location.href = url), 240);
              }
            },
            { passive: true },
          );
        }
      });

      /* ── TAP OUTSIDE — RESET ─────────────────────────── */
      document.addEventListener(
        "touchend",
        (e) => {
          if (!e.target.closest(".hero-line")) {
            resetAllLines();
          }
        },
        { passive: true },
      );
    </script>
  </body>
</html>
