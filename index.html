<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AM — Portal</title>
    <link
      rel="shortcut icon"
      href="image/power_14807072.png"
      type="image/x-icon"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Oswald:wght@500..700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        font-family: "Oswald", sans-serif;
        overflow: hidden;
      }
      body {
        background: #000;
        color: #f0f0f0;
        transition:
          background 0.8s cubic-bezier(0.16, 1, 0.3, 1),
          color 0.8s ease;
      }

      body.hover-design {
        background: #ffffff;
        color: #000000;
      }
      body.hover-play {
        background: #f5e642;
        color: #d61414;
      }
      body.hover-universe {
        background: #04072b;
        color: #ffffff;
      }

      #bg-video {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        object-fit: cover;
        z-index: 0;
        opacity: 0.17;
        pointer-events: none;
      }

      #intro {
        position: fixed;
        inset: 0;
        background: #ffffff;
        z-index: 9000;
        display: none;
        transition: transform 0.9s cubic-bezier(0.76, 0, 0.24, 1);
      }
      #intro.ready {
        display: block;
      }
      #intro.slide-up {
        transform: translateY(-100%);
      }

      .hero-line,
      .corner-tl,
      .corner-tr,
      .corner-bl,
      .marquee-bar,
      .bottom-hint {
        opacity: 0;
        transform: translateY(28px);
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hero-line.revealed,
      .corner-tl.revealed,
      .corner-tr.revealed,
      .corner-bl.revealed,
      .marquee-bar.revealed,
      .bottom-hint.revealed {
        opacity: 1;
        transform: translateY(0);
      }

      @media (hover: hover) and (pointer: fine) {
        html,
        body {
          cursor: none;
        }
      }
      .cursor,
      .cursor-ring {
        position: fixed;
        pointer-events: none;
        transform: translate(-50%, -50%);
        display: none;
      }
      .cursor {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: currentColor;
        z-index: 9999;
        transition:
          transform 0.12s,
          opacity 0.3s;
      }
      .cursor-ring {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        border: 1px solid currentColor;
        z-index: 9998;
        opacity: 0.35;
      }
      @media (hover: hover) and (pointer: fine) {
        .cursor,
        .cursor-ring {
          display: block;
        }
      }

      .noise {
        position: fixed;
        inset: 0;
        pointer-events: none;
        z-index: 100;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
        background-size: 160px;
      }
      .vline {
        position: fixed;
        top: 0;
        width: 1px;
        height: 100vh;
        background: currentColor;
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.3s ease;
        display: none;
      }
      @media (hover: hover) and (pointer: fine) {
        .vline {
          display: block;
        }
      }

      .corner-tl,
      .corner-tr,
      .corner-bl {
        position: fixed;
        font-size: 11px;
        letter-spacing: 0.22em;
        text-transform: uppercase;
        pointer-events: none;
        z-index: 50;
      }
      .corner-tl {
        top: 2rem;
        left: 2.5rem;
      }
      .corner-tr {
        top: 2rem;
        right: 2.5rem;
      }
      .corner-bl {
        bottom: 3rem;
        left: 2.5rem;
      }

      .hero {
        height: 100svh;
        display: flex;
        flex-direction: column;
        justify-content: center;
        padding-left: clamp(3rem, 14vw, 16rem);
        margin-left: 8rem;
        margin-top: 2.7rem;
      }
      .hero-line {
        position: relative;
        padding: 0.06em 0;
        cursor: pointer;
        -webkit-tap-highlight-color: transparent;
      }
      .hero-line h1 {
        font-size: clamp(2.8rem, 13vw, 15rem);
        font-weight: 800;
        line-height: 0.88;
        letter-spacing: -0.025em;
        display: inline-block;
        transition: transform 0.65s cubic-bezier(0.16, 1, 0.3, 1);
        user-select: none;
        white-space: nowrap;
      }
      .hero-line.active h1 {
        transform: translateX(2rem);
      }

      .char {
        display: inline-block;
        transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      }

      .ticker {
        position: absolute;
        bottom: 0;
        left: 0;
        height: 1.5px;
        width: 0;
        background: currentColor;
        transition: width 0.65s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .hero-line.touch-active .ticker {
        width: 100%;
      }
      @media (hover: hover) and (pointer: fine) {
        .hero-line:hover .ticker {
          width: 100%;
        }
      }

      .idx {
        position: absolute;
        left: -3.2rem;
        top: 50%;
        transform: translateY(-50%);
        font-size: 10px;
        opacity: 0.28;
        letter-spacing: 0.15em;
        pointer-events: none;
      }
      .enter-tag {
        position: absolute;
        right: clamp(1rem, 6vw, 5rem);
        top: 50%;
        transform: translateY(-50%) translateX(10px);
        font-size: 10px;
        letter-spacing: 0.25em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        transition:
          opacity 0.4s ease,
          transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
      }
      @media (hover: hover) and (pointer: fine) {
        .hero-line:hover .enter-tag {
          opacity: 0.45;
          transform: translateY(-50%) translateX(0);
        }
      }
      .hero-line.touch-active .enter-tag {
        opacity: 0.45;
        transform: translateY(-50%) translateX(0);
      }

      .img-slot {
        position: fixed;
        pointer-events: none;
        z-index: 200;
        overflow: hidden;
        border-radius: 3px;
      }
      .img-slot img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
      }

      .marquee-bar {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        height: 30px;
        border-top: 0.5px solid currentColor;
        overflow: hidden;
        display: flex;
        align-items: center;
        pointer-events: none;
        z-index: 50;
      }
      .marquee-bar.revealed {
        opacity: 0.2;
      }
      .marquee-inner {
        display: flex;
        gap: 2rem;
        white-space: nowrap;
        font-size: 10px;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        animation: tick 22s linear infinite;
      }
      @keyframes tick {
        from {
          transform: translateX(0);
        }
        to {
          transform: translateX(-50%);
        }
      }

      .bottom-hint {
        position: fixed;
        bottom: 42px;
        left: 50%;
        transform: translateX(-50%) translateY(28px);
        font-size: 9px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        opacity: 0;
        pointer-events: none;
        z-index: 60;
        text-align: center;
        white-space: nowrap;
        transition:
          opacity 0.7s ease,
          transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .bottom-hint.revealed {
        opacity: 0.28;
        transform: translateX(-50%) translateY(0);
      }
      .bottom-hint.dismissed {
        opacity: 0 !important;
        transition: opacity 0.4s ease;
      }

      /* ── PLAY BUTTON (mobile video fallback) ── */
      #play-btn {
        position: fixed;
        bottom: 80px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 500;
        display: none; /* hidden by default */
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        opacity: 0;
        transition: opacity 0.5s ease;
        -webkit-tap-highlight-color: transparent;
      }
      /* shown when video fails to autoplay */
      #play-btn.visible {
        display: flex;
      }
      #play-btn.show {
        opacity: 1;
      }

      .play-circle {
        width: 44px;
        height: 44px;
        border-radius: 50%;
        border: 1px solid currentColor;
        display: flex;
        align-items: center;
        justify-content: center;
        opacity: 0.6;
      }
      .play-label {
        font-family: "Oswald", sans-serif;
        font-size: 9px;
        letter-spacing: 0.3em;
        text-transform: uppercase;
        opacity: 0.4;
      }

      /* ── RESPONSIVE ── */
      @media (max-width: 1024px) {
        .hero {
          margin-left: 4rem;
          padding-left: clamp(2.5rem, 8vw, 6rem);
        }
      }
      @media (max-width: 768px) {
        .hero {
          margin-left: 0;
          padding-left: clamp(2.2rem, 7vw, 4rem);
        }
        .corner-tr {
          display: none;
        }
        .hero-line h1 {
          font-size: clamp(2.6rem, 12vw, 7rem);
        }
        .idx {
          left: -2.2rem;
          font-size: 9px;
        }
      }
      @media (max-width: 540px) {
        .hero {
          height: 100svh;
          margin-left: 0;
          padding-left: 1.6rem;
          padding-right: 1.6rem;
          justify-content: center;
        }
        .hero-line {
          padding: 0.5em 0;
        }
        .hero-line h1 {
          font-size: clamp(2.4rem, 16.5vw, 3.6rem);
          line-height: 0.9;
          letter-spacing: -0.03em;
        }
        .hero-line.active h1 {
          transform: translateX(0.6rem);
        }
        .idx {
          left: -1.8rem;
          font-size: 8px;
          letter-spacing: 0.1em;
        }
        .corner-tl {
          top: 1.3rem;
          left: 1.4rem;
          font-size: 10px;
        }
        .corner-tr {
          display: none;
        }
        .corner-bl {
          bottom: 2.4rem;
          left: 1.4rem;
          font-size: 9px;
        }
        .marquee-bar {
          height: 26px;
        }
        .marquee-inner {
          font-size: 9px;
        }
        .bottom-hint {
          bottom: 38px;
          font-size: 8px;
          letter-spacing: 0.22em;
        }
      }
      @media (max-width: 380px) {
        .hero {
          padding-left: 1.2rem;
          padding-right: 1.2rem;
        }
        .hero-line h1 {
          font-size: clamp(2rem, 17vw, 3rem);
        }
        .hero-line {
          padding: 0.42em 0;
        }
        .idx {
          left: -1.4rem;
          font-size: 7px;
        }
      }
    </style>
  </head>
  <body>
    <div id="intro"></div>

    <!-- MOBILE VIDEO FALLBACK BUTTON -->
    <div id="play-btn">
      <div class="play-circle">
        <svg width="14" height="14" viewBox="0 0 14 14" fill="currentColor">
          <polygon points="3,1 13,7 3,13" />
        </svg>
      </div>
      <span class="play-label">Play Reel</span>
    </div>

    <video
      id="bg-video"
      src="video/Folio edit.mp4"
      autoplay
      loop
      muted
      playsinline
      webkit-playsinline
      preload="auto"
      disablepictureinpicture
      disableremoteplayback
    ></video>

    <div class="cursor" id="cur"></div>
    <div class="cursor-ring" id="ring"></div>
    <div class="noise"></div>
    <div class="vline" id="vline"></div>

    <span class="corner-tl">AM</span>
    <span class="corner-tr">Portal — 2026</span>
    <span class="corner-bl">Lagos, NG</span>

    <div class="img-slot" id="slotL-a"><img id="imgLA" src="" alt="" /></div>
    <div class="img-slot" id="slotL-b"><img id="imgLB" src="" alt="" /></div>
    <div class="img-slot" id="slotR-a"><img id="imgRA" src="" alt="" /></div>
    <div class="img-slot" id="slotR-b"><img id="imgRB" src="" alt="" /></div>

    <main>
      <section class="hero">
        <div
          class="hero-line"
          data-word="Design"
          data-hover-class="hover-design"
          data-url="https://amdev-main.vercel.app/home.html"
          data-left="image/AM WIDE.png"
          data-right="image/AM SLIM.png"
          data-lw="250"
          data-lh="250"
          data-lleft="3vw"
          data-ltop="50%"
          data-lmt="-140"
          data-rw="600"
          data-rh="350"
          data-rright="10vw"
          data-rtop="50%"
          data-rmt="-350"
          data-mob-lw="40vw"
          data-mob-lh="25vw"
          data-mob-lleft="0px"
          data-mob-lmt="40vw"
          data-mob-rw="70vw"
          data-mob-rh="40vw"
          data-mob-rright="0px"
          data-mob-rmt="-70vw"
        >
          <span class="idx">01</span>
          <h1></h1>
          <div class="ticker"></div>
          <span class="enter-tag">→ Enter</span>
        </div>

        <div
          class="hero-line"
          data-word="Play"
          data-hover-class="hover-play"
          data-url="https://amdev2.vercel.app/"
          data-left="image/GP SLIM.png"
          data-right="image/GP WIDE.png"
          data-lw="250"
          data-lh="450"
          data-lleft="3vw"
          data-ltop="50%"
          data-lmt="-140"
          data-rw="800"
          data-rh="450"
          data-rright="4vw"
          data-rtop="50%"
          data-rmt="-350"
          data-mob-lw="40vw"
          data-mob-lh="40vw"
          data-mob-lleft="0px"
          data-mob-lmt="-70vw"
          data-mob-rw="80vw"
          data-mob-rh="40vw"
          data-mob-rright="0px"
          data-mob-rmt="30vw"
        >
          <span class="idx">02</span>
          <h1></h1>
          <div class="ticker"></div>
          <span class="enter-tag">→ Enter</span>
        </div>

        <div
          class="hero-line"
          data-word="Universe"
          data-hover-class="hover-universe"
          data-url="https://solarsystem-two.vercel.app/"
          data-left="image/uni WIDE.png"
          data-right="image/uni SLIM.png"
          data-lw="500"
          data-lh="225"
          data-lleft="12.5vw"
          data-ltop="35%"
          data-lmt="-350"
          data-rw="350"
          data-rh="450"
          data-rright="10vw"
          data-rtop="60%"
          data-rmt="-140"
          data-mob-lw="80vw"
          data-mob-lh="40vw"
          data-mob-lleft="0px"
          data-mob-lmt="35vw"
          data-mob-rw="40vw"
          data-mob-rh="60vw"
          data-mob-rright="0px"
          data-mob-rmt="-50vw"
        >
          <span class="idx">03</span>
          <h1></h1>
          <div class="ticker"></div>
          <span class="enter-tag">→ Enter</span>
        </div>
      </section>
    </main>

    <div class="marquee-bar">
      <div class="marquee-inner">
        <span>Design</span><span>·</span><span>Play</span><span>·</span>
        <span>Universe</span><span>·</span><span>Design</span><span>·</span>
        <span>Play</span><span>·</span><span>Universe</span><span>·</span>
        <span>Design</span><span>·</span><span>Play</span><span>·</span>
        <span>Universe</span><span>·</span><span>Design</span><span>·</span>
        <span>Play</span><span>·</span><span>Universe</span><span>·</span>
      </div>
    </div>

    <p class="bottom-hint" id="bottom-hint"></p>

    <script type="module" src="index.js"></script>
  </body>
</html>
